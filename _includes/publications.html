{% include base_path %}
{% if post.id %}
  {% assign title = post.title | markdownify | remove: "<p>" | remove: "</p>" %}
{% else %}
  {% assign title = post.title %}
{% endif %}

<div class="{{ include.type | default: "list" }}__item">
  <article>
    <b>{{ title }}</b><br>
<i>{{ post.excerpt}}</i> [<a href="{{ post.paperurl }}" rel="permalink"><b>{{ post.venue }}</b></a>, {{ post.date | default: "1900-01-01" | date: "%Y" }}]<br><br>
  </article>
</div>
